name: Compile Examples with Free Pascal

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  compile-fpc-examples:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install Free Pascal
      run: |
        sudo apt-get update
        sudo apt-get install -y fpc
    
    - name: Verify FPC installation
      run: fpc
       
    - name: Compile lazlogger example
      run: |
        cd examples/lazlogger
        fpc -FUlib HelloWorld.lpi
    
