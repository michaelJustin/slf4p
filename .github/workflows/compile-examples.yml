name: Compile Examples with Free Pascal

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  compile-fpc-examples:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Free Pascal
      run: |
        sudo apt-get update
        sudo apt-get install -y fpc
       
    - name: Compile simple example
      run: |
        cd examples/simple
        fpc -Fu../../src/main HelloWorld.lpr
    
