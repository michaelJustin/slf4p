name: Compile Examples with Free Pascal

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  compile-fpc-examples:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Install Free Pascal
      run: |
        sudo apt-get -qq update
        sudo apt-get -qq install -y fpc
       
    - name: Compile simple example
      run: |
        cd examples/simple
        fpc -Sd -Fu../../src/main HelloWorld.lpr

    - name: Run simple example
      run: examples/simple/HelloWorld
      
    
